name: Bug Report
description: Something isn't working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Select a photo
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: e.g. iPhone 15, Pixel 8, MacBook Pro
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & version
      placeholder: e.g. Safari 17, Chrome 120
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context (screenshots, screen recordings)
